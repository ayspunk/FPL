name: Fetch FPL Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch FPL data
        run: node scripts/fetch-fpl.js

      - name: Commit & Push
        run: |
          git config user.name "FPL Bot"
          git config user.email "fpl-bot@github.actions"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "📊 FPL data update: $TIMESTAMP"
            git push
          fi
