<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPL Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23037235%22/><text y=%2265%22 x=%2218%22 font-size=%2248%22>⚽</text><text y=%2290%22 x=%2255%22 font-size=%2230%22 fill=%22%23ffd740%22>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00e676">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FPL Dashboard">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<header id="app-header">
  <div class="logo">⚽ <span class="logo-fpl">FPL</span><span class="logo-dash">Dashboard</span></div>
  <div class="header-right">
    <div class="deadline-wrap" id="deadline-wrap" title="Countdown ke deadline GW berikutnya"></div>
    <span id="deadline-timer"></span>
    <div class="badge badge-gw" id="gw-badge" title="GW aktif">GW –</div>
    <select class="gw-select" id="gw-select" onchange="UI.changeTargetGW(+this.value)" title="Pilih GW untuk analisis">
      <option value="0">Auto</option>
    </select>
    <div class="badge badge-src" id="src-badge">–</div>
    <button class="btn btn-sm btn-theme" id="theme-btn" onclick="UI.cycleTheme()" title="Ganti tema">🌙</button>
    <button class="btn btn-sm btn-wa" onclick="UI.sendWhatsAppReminder()" title="Kirim reminder ke WhatsApp">💬</button>
    <button class="btn btn-sm btn-refresh" onclick="App.refresh()">↻ Refresh</button>
    <button class="btn btn-sm btn-pwa" id="pwa-install-btn" onclick="pwaInstall()" title="Install sebagai App" style="display:none">📲</button>
  </div>
</header>

<nav id="main-nav">
  <div class="tab active" data-tab="lineup">📋 Line-up</div>
  <div class="tab" data-tab="scout">🔍 Scout</div>
  <div class="tab" data-tab="fdr">🗓 FDR</div>
  <div class="tab" data-tab="epl">🏴󠁧󠁢󠁥󠁮󠁧󠁿 EPL</div>
  <div class="tab" data-tab="league">🏆 League</div>
  <div class="tab" data-tab="other">👤 My FPL</div>
  <div class="tab tab-icon" data-tab="settings">⚙</div>
</nav>

<div id="subtab-bar" class="subtab-bar"></div>

<main id="app-main">
  <div id="panel-lineup"  class="panel active"><div class="panel-inner" id="content-lineup"></div></div>
  <div id="panel-scout"   class="panel"><div class="panel-inner" id="content-scout"></div></div>
  <div id="panel-fdr"     class="panel"><div class="panel-inner" id="content-fdr"></div></div>
  <div id="panel-epl"     class="panel"><div class="panel-inner" id="content-epl"></div></div>
  <div id="panel-league"  class="panel"><div class="panel-inner" id="content-league"></div></div>
  <div id="panel-other"   class="panel"><div class="panel-inner" id="content-other"></div></div>
  <div id="panel-settings" class="panel"><div class="panel-inner" id="content-settings"></div></div>
</main>

<footer id="app-footer">
  <span>⚽ FPL Dashboard</span>
  <span>Credit: <b>ays</b></span>
  <span class="dim">Powered by FPL API · Data © Fantasy Premier League</span>
</footer>

<div id="tooltip" class="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
<script>
// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(r => {
    console.log('[SW] Registered:', r.scope);
  }).catch(e => console.log('[SW] Error:', e));
}

// PWA Install Prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'inline-flex';
  // Show install banner
  showInstallBanner();
  console.log('[PWA] Install prompt available');
});
window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('pwa-install-btn');
  if (btn) btn.style.display = 'none';
  hideInstallBanner();
  console.log('[PWA] Installed!');
});
function pwaInstall() {
  if (!deferredPrompt) {
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const msg = isIOS
      ? 'Untuk install di iOS:\n\n1. Tap tombol Share (□↑) di Safari\n2. Scroll ke bawah\n3. Tap "Add to Home Screen"'
      : 'Untuk install:\n\nMenu ⋮ → "Add to Home Screen"\natau "Install App"';
    alert(msg);
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    console.log('[PWA] Choice:', r.outcome);
    deferredPrompt = null;
  });
}

// Install banner for first-time mobile users
function showInstallBanner() {
  if (localStorage.getItem('fpl_pwa_dismissed')) return;
  if (window.matchMedia('(display-mode: standalone)').matches) return; // Already installed
  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.innerHTML = `
    <div style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#0d1f3c,#0a1628);border-top:2px solid var(--green);padding:12px 16px;z-index:999;display:flex;align-items:center;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,.5)">
      <div style="font-size:24px">⚽</div>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px;color:var(--green)">Install FPL Dashboard</div>
        <div style="font-size:12px;color:var(--text2)">Akses cepat dari Home Screen · Offline support</div>
      </div>
      <button onclick="pwaInstall()" style="background:var(--green);color:#000;border:none;padding:8px 16px;border-radius:4px;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:1px">INSTALL</button>
      <button onclick="hideInstallBanner()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;padding:4px">✕</button>
    </div>`;
  document.body.appendChild(banner);
}
function hideInstallBanner() {
  const b = document.getElementById('pwa-banner');
  if (b) b.remove();
  localStorage.setItem('fpl_pwa_dismissed', '1');
}

// iOS: show install hint on first visit
(function() {
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('fpl_pwa_dismissed')) {
    setTimeout(() => showInstallBanner(), 3000);
  }
})();
</script>
</body>
</html>
