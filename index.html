<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPL Dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23037235%22/><text y=%2265%22 x=%2218%22 font-size=%2248%22>⚽</text><text y=%2290%22 x=%2255%22 font-size=%2230%22 fill=%22%23ffd740%22>⚡</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header">
  <div class="logo">⚽ <span class="logo-fpl">FPL</span><span class="logo-dash">Dashboard</span></div>
  <div class="header-right">
    <div class="deadline-wrap" id="deadline-wrap" title="Countdown ke deadline GW berikutnya"></div>
    <span id="deadline-timer"></span>
    <div class="badge badge-gw" id="gw-badge" title="GW aktif">GW –</div>
    <select class="gw-select" id="gw-select" onchange="UI.changeTargetGW(+this.value)" title="Pilih GW untuk analisis">
      <option value="0">Auto</option>
    </select>
    <div class="badge badge-src" id="src-badge">–</div>
    <button class="btn btn-sm btn-theme" id="theme-btn" onclick="UI.cycleTheme()" title="Ganti tema">🌙</button>
    <button class="btn btn-sm btn-wa" onclick="UI.sendWhatsAppReminder()" title="Kirim reminder ke WhatsApp">💬</button>
    <button class="btn btn-sm btn-refresh" onclick="App.refresh()">↻ Refresh</button>
  </div>
</header>

<nav id="main-nav">
  <div class="tab active" data-tab="lineup">📋 Line-up</div>
  <div class="tab" data-tab="scout">🔍 Scout</div>
  <div class="tab" data-tab="fdr">🗓 FDR</div>
  <div class="tab" data-tab="epl">🏴󠁧󠁢󠁥󠁮󠁧󠁿 EPL</div>
  <div class="tab" data-tab="league">🏆 League</div>
  <div class="tab" data-tab="other">👤 My FPL</div>
  <div class="tab tab-icon" data-tab="settings">⚙</div>
</nav>

<div id="subtab-bar" class="subtab-bar"></div>

<main id="app-main">
  <div id="panel-lineup"  class="panel active"><div class="panel-inner" id="content-lineup"></div></div>
  <div id="panel-scout"   class="panel"><div class="panel-inner" id="content-scout"></div></div>
  <div id="panel-fdr"     class="panel"><div class="panel-inner" id="content-fdr"></div></div>
  <div id="panel-epl"     class="panel"><div class="panel-inner" id="content-epl"></div></div>
  <div id="panel-league"  class="panel"><div class="panel-inner" id="content-league"></div></div>
  <div id="panel-other"   class="panel"><div class="panel-inner" id="content-other"></div></div>
  <div id="panel-settings" class="panel"><div class="panel-inner" id="content-settings"></div></div>
</main>

<footer id="app-footer">
  <span>⚽ FPL Dashboard</span>
  <span>Credit: <b>ays</b></span>
  <span class="dim">Powered by FPL API · Data © Fantasy Premier League</span>
</footer>

<div id="tooltip" class="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
